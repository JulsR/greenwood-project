document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ared for Kwesi Smith &amp; Diane&nbsp;&nbsp;·&nbsp;&nbsp;June 2026<\u002Fp>\n\n    <!-- Lede -->\n    <p style=\"font-family: 'Newsreader', Georgia, serif; font-size: 18px; line-height: 1.62; color: #2C322C; margin: 0 0 40px; padding: 0 0 0 20px; border-left: 3px solid #DDE6DD; text-wrap: pretty;\">I'm aligned with the vision in the goals brief: the gap is value, not volume, and thought leadership — not event recaps — is the growth engine. This plan confirms the approach and maps how the work fits the engagement, so we hit the <strong style=\"font-weight: 600; color: #1C211C;\">September 30 targets<\u002Fstrong> sustainably and predictably.<\u002Fp>\n\n    <!-- Section: Content approach -->\n    <section class=\"keep\" style=\"margin: 0 0 38px;\">\n      <h2 style=\"font-family: 'Libre Franklin', sans-serif; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #1C211C; margin: 0 0 18px; padding-bottom: 10px; border-bottom: 1px solid #E6E4DC;\">Content Approach — Confirmed<\u002Fh2>\n\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px;\">\n        <div style=\"background: #F4F7F2; border: 1px solid #E2EBE0; border-radius: 6px; padding: 18px 18px 16px;\" class=\"greentag\">\n          <div style=\"font-family: 'Newsreader', serif; font-size: 30px; font-weight: 500; color: #3F6B52; line-height: 1; margin-bottom: 10px;\">50%<\u002Fdiv>\n          <div style=\"font-size: 12.5px; line-height: 1.45; color: #3A403A;\">Thought leadership &amp; industry insight<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: #F7F7F4; border: 1px solid #E6E4DC; border-radius: 6px; padding: 18px 18px 16px;\">\n          <div style=\"font-family: 'Newsreader', serif; font-size: 30px; font-weight: 500; color: #1C211C; line-height: 1; margin-bottom: 10px;\">30%<\u002Fdiv>\n          <div style=\"font-size: 12.5px; line-height: 1.45; color: #3A403A;\">Scholar stories as proof of the thesi r: #3A403A; line-height: 1.4;\">3+ / week<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; color: #1C211C; font-weight: 600; line-height: 1.4;\">Substack cross-promo<\u002Ftd>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; color: #3A403A; line-height: 1.4;\">Monthly<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; color: #1C211C; font-weight: 600; line-height: 1.4;\">Analytics report<\u002Ftd>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; color: #3A403A; line-height: 1.4;\">By the 5th of each month<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; color: #1C211C; font-weight: 600; line-height: 1.4;\">Structured campaigns<\u002Ftd>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; color: #3A403A; line-height: 1.4;\">3 / quarter<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fsection>\n\n    <!-- Section: hours -->\n    <section class=\"keep\" style=\"margin: 0 0 38px;\">\n      <h2 style=\"font-family: 'Libre Franklin', sans-serif; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #1C211C; margin: 0 0 6px; padding-bottom: 10px; border-bottom: 1px solid #E6E4DC;\">How the Work Maps to 15–20 hrs / week<\u002Fh2>\n      <p style=\"font-size: 13px; line-height: 1.6; color: #6B7169; margin: 14px 0 16px;\">So we share the same picture of where the time goes:<\u002Fp>\n\n      <table style=\"width: 100%; border-collapse: collapse; font-size: 13px;\">\n        <thead>\n          <tr class=\"greentag\" style=\"background: #F4F7F2;\">\n            <th style=\"text-align: left; font-weight: 600; color: #3F6B52; padding: 11px 14px; border-bottom: 2px solid #DDE6DD; font-size:  #3A403A; line-height: 1.4;\">Analytics &amp; monthly reporting (amortized)<\u002Ftd>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; text-align: right; font-weight: 600; color: #1C211C;\">1<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; color: #3A403A; line-height: 1.4;\">Strategy, workflow building, coordination &amp; meetings<\u002Ftd>\n            <td style=\"padding: 11px 14px; border-bottom: 1px solid #EDEBE4; text-align: right; font-weight: 600; color: #1C211C;\">2–3<\u002Ftd>\n          <\u002Ftr>\n          <tr class=\"greentag\" style=\"background: #F7F7F4;\">\n            <td style=\"padding: 12px 14px; color: #1C211C; font-weight: 600;\">Estimated total<\u002Ftd>\n            <td style=\"padding: 12px 14px; text-align: right; font-weight: 700; color: #3F6B52;\">15–19<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <p style=\"font-size: 12px; line-height: 1.6; color: #6B7169; margin: 16px 0 0; font-style: italic;\">Note: the July–September build phase front-loads workflow setup, so early weeks may run toward the top of the range. Meetings, coordination, and reporting are counted within contracted hours.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- Two column: need / confirm -->\n    <section class=\"keep\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 36px; margin: 0 0 38px;\">\n      <div>\n        <h2 style=\"font-family: 'Libre Franklin', sans-serif; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #1C211C; margin: 0 0 16px; padding-bottom: 10px; border-bottom: 1px solid #E6E4DC;\">What I'll Need to Deliver Reliably<\u002Fh2>\n        <ul style=\"list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 13px;\">\n          <li style=\"display: flex; gap: 10px; font-size: 13px; line-height: 1.55; color: #3A403A;\"><span style=\ weight: 700; color: #1C211C; margin: 0 0 16px; padding-bottom: 10px; border-bottom: 1px solid #E6E4DC;\">Two Things to Confirm Together<\u002Fh2>\n        <ul style=\"list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 13px;\">\n          <li style=\"display: flex; gap: 10px; font-size: 13px; line-height: 1.55; color: #3A403A;\"><span style=\"flex: none; width: 18px; height: 18px; border-radius: 4px; background: #F4F7F2; border: 1px solid #C9DCC9; color: #3F6B52; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px;\">1<\u002Fspan><span><strong style=\"font-weight: 600; color: #1C211C;\">An approval workflow that fits the cadence<\u002Fstrong> — standing approvals or the formal content/AI policies the agreement anticipates — so 4+ posts a week ship on time rather than waiting on per-item sign-off.<\u002Fspan><\u002Fli>\n          <li style=\"display: flex; gap: 10px; font-size: 13px; line-height: 1.55; color: #3A403A;\"><span style=\"flex: none; width: 18px; height: 18px; border-radius: 4px; background: #F4F7F2; border: 1px solid #C9DCC9; color: #3F6B52; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px;\">2<\u002Fspan><span><strong style=\"font-weight: 600; color: #1C211C;\">Written approval to feature this work in my portfolio<\u002Fstrong> — approved samples and results — since work product and metrics are Greenwood's under the agreement.<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Targets -->\n    <section class=\"keep greentag\" style=\"background: #2A302A; border-radius: 8px; padding: 30px 32px; margin: 0 0 26px;\">\n      <h2 style=\"font-family: 'Libre Franklin', sans-serif; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; color: #9FC4AC; margin: 0 0 16px;\">Targets, Build Phase &amp; Checkpoint<\u002Fh2>\n      <div style=\"display: flex; gap: 36px; flex-wrap: wrap; margin-bottom: 18px;\">\n        <div>\n          <div style=\"font-family: 'Newsreader', serif; font-size: 32px; font-weight: 500; color: #fff; line-height: 1;\">~340<span style=\"font-size: 15px; color: #9FC4AC; font-family: 'Libre Franklin', sans-serif; font-weight: 500;\"> /mo<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #A6ADA4; margin-top: 6px; letter-spacing: 0.03em;\">New LinkedIn followers &nbsp;·&nbsp; 5%+ engagement<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Newsreader', serif; font-size: 32px; font-weight: 500; color: #fff; line-height: 1;\">~157<span style=\"font-size: 15px; color: #9FC4AC; font-family: 'Libre Franklin', sans-serif; font-weight: 500;\"> /mo<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #A6ADA4; margin-top: 6px; letter-spacing: 0.03em;\">New Instagram followers &nbsp;·&nbsp; 3%+ engagement<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 13px; line-height: 1.65; color: #D2D6CF; margin: 0 0 14px;\">Steady monthly pace from <strong style=\"color: #fff; font-weight: 600;\">October<\u002Fstrong>. July–September is the build phase — growth here is an early signal, not a held number; the consistent pace begins in October.<\u002Fp>\n      <p style=\"font-size: 13px; line-height: 1.65; color: #D2D6CF; margin: 0; padding-top: 14px; border-top: 1px solid #3D453D;\">I'd propose a <strong style=\"color: #fff; font-weight: 600;\">review at the end of September<\u002Fstrong> to assess results against these targets and recalibrate scope, targets, and terms together for Q4 onward.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- Out of scope -->\n    <p style=\"font-size: 12.5px; line-height: 1.6; color: #6B7169; margin: 0;\"><strong style=\"font-weight: 600; color: #1C211C; text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px;\">Out of scope for FY26<\u002Fstrong> &nbsp;(no
