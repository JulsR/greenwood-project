  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 monospace;\n    --t-kicker:24px; --t-title:64px; --t-sub:38px; --t-body:29px; --t-small:24px;\n    --px:104px; --pt:80px; --pb:72px;\n  }\n  *{box-sizing:border-box;}\n  body{margin:0;}\n  .slide{box-sizing:border-box; padding:var(--pt) var(--px) var(--pb); display:flex; flex-direction:column; background:var(--paper); color:var(--ink); font-family:var(--sans);}\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"744ac0fb-4547-4052-bd25-1b4641825674#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <!-- 01 · COVER -->\n  <section data-label=\"Cover\" data-screen-label=\"01 Cover\" data-speaker-notes=\"Scope note: this is the social channels cut of the Week 1 audit — LinkedIn, Instagram, YouTube and the founder's personal brand. Website is out of scope here.\" class=\"slide\" style=\"justify-content:space-between;\">\n    <div style=\"display:flex; align-items:center; gap:14px;\">\n      <span style=\"width:12px; height:12px; background:var(--green); display:block;\"><\u002Fspan>\n      <span style=\"font-family:var(--mono); font-size:var(--t-kicker); letter-spacing:0.16em; text-transform:uppercase; color:var(--gray);\">Greenwood Project · Content Strategy<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"max-width:1480px;\">\n      <h1 style=\"font-size:104px; font-weight:700; letter-spacing:-0.025em; line-height:1.0; margin:0; color:var(--ink);\">Social Media<br>Channel Audit<\u002Fh1>\n      <div style=\"width:96px; height:6px; background:var(--green); margin:40px 0 34px;\"><\u002Fdiv>\n      <p style=\"font-size:var(--t-sub); line-height:1.3; color:var(--gray); margin:0; max-width:1180px;\">Week 1 baseline — where Greenwood's social channels stand today, and where the leverage is.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid var(--line); padding-top:28px;\">\n      <span style=\"font-size:var(--t-small); color:var(--ink);\">Prepared for <strong>Kwesi Smith<\u002Fstrong>, CEO · <strong>Diane<\u002Fstrong>, Director of Partnerships<\u002Fspan>\n      <span style=\"font-family:var(--mono); font-size:24px; letter-spacing:0.06em; color:var(--gray-2);\">Creative Content Strategist · June 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 · HEADLINE -->\n  <section data-label=\"The headline\" data-screen-label=\"02 Headline\" data-speaker-notes=\"Four social findings. LinkedIn is the strongest platform, scholar stories are the best raw material, Instagram is high-effort low-return, and the founder voice is the biggest untapped lever.\" class=\"slide\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:34px;\">\n      <span style=\"width:11px; height:11px; background:var(--green); display:block;\"><\u002Fspan>\n      <span style=\"font-family:var(--mono); font-size:var(--t-kicker); letter-spacing:0.14em; text-transform:uppercase; color:var(--gray);\">The headline<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-size:var(--t-title); font-weight:700; letter-spacing:-0.02em; line-height:1.04; margin:0 0 48px;\">What the social audit found<\u002Fh2>\n    <div style=\"display:flex; flex-direction:column; flex:1;\">\n      <div style=\"display:flex; gap:34px; align-items:baseline; padding:28px 0; border-top:1px solid var(--line);\">\n        <span style=\"font-family:var(--mono); font-size:38px; color:var(--green-deep); font-weight:500; min-width:52px;\">1<\u002Fspan>\n        <div style=\"flex:1;\"><span style=\"display:block; font-size:32px; font-weight:700; margin-bottom:6px;\">LinkedIn is the strongest platform.<\u002Fspan><span style=\"display:block; font-size:26px; color:var(--gray); line-height:1.4;\">It reaches the partners and donors that matter most — and is the best base to build authority on.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:34px; align-items:baseline; padding:28px 0; border-top:1px solid var(--line);\">\n        <span style=\"font-family:var(--mono); font-size:38px; color:var(--green-deep); font-weight:500; min-width:52px;\">2<\u002Fspan>\n        <div style=\"flex:1;\"><span style=\"display:block; font-size:32px; font-weight:700; margin-bottom:6px;\">Scholar stories are the strongest content.<\u002Fspan><span style=\"display:block; font-size:26px; color:var(--gray); line-height:1.4;\">Placement wins and scholar journeys are the most credible, resonant, and easiest material to scale.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:34px; align-items:baseline; padding:28px 0; border-top:1px solid var(--line);\">\n        <span style=\"font-family:var(--mono); font-size:38px; color:var(--green-deep); font-weight:500; min-width:52px;\">3<\u002Fspan>\n        <div style=\"flex:1;\"><span style=\"display:block; font-size:32px; font-weight:700; margin-bottom:6px;\">Instagram is high effort, low return.<\u002Fspan><span style=\"display:block; font-size:26px; color:var(--gray); line-height:1.4;\">1,493 posts but just 1,960 followers. The issue is the system, not the effort.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:34px; align-items:baseline; padding:28px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line);\">\n        <span style=\"font-family:var(--mono); font-size:38px; color:var(--green-deep); font-weight:500; min-width:52px;\">4<\u002Fspan>\n        <div style=\"flex:1;\"><span style=\"display:block; font-size:32px; font-weight:700; margin-bottom:6px;\">Founder thought leadership is the biggest untapped lever.<\u002Fspan><span style=\"display:block; font-size:26px; color:var(--gray); line-height:1.4;\">Kwesi is a credible voice with almost no owned presence (Substack ≈ 14 subscribers).<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 · LINKEDIN -->\n  <section data-label=\"LinkedIn\" data-screen-label=\"03 LinkedIn\" data-speaker-notes=\"Best audience-fit channel. Credible proof, steady cadence — but heavily announcement-driven with little POV and rare founder voice. Add a weekly thought-leadership cadence.\" class=\"slide\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:28px;\">\n      <span style=\"width:11px; height:11px; background:var(--green); display:block;\"><\u002Fspan>\n      <span style=\"font-family:var(--mono); font-size:var(--t-kicker); letter-spacing:0.14em; text-transform:uppercase; color:var(--gray);\">Channel review · 1 of 4<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:48px; margin-bottom:38px;\">\n      <div style=\"flex:1;\">\n        <h2 style=\"font-size:52px; font-weight:700; letter-spacing:-0.02em; margin:0 0 22px;\">Greenwood LinkedIn<\u002Fh2>\n        <div style=\"display:flex; gap:18px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gray-2); min-width:160px;\">Purpose<\u002Fspan><span style=\"font-size:25px; flex:1;\">Thought leadership, recruiting visibility, and employer + donor trust.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:baseline;\"><span style=\"font-family:var(--mono); font-size:18px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gray-2); min-width:160px;\">Content<\u002Fspan><span style=\"font-size:25px; color:var(--gray); flex:1;\">Scholar placement wins, board &amp; team news, event recaps, newsletter CTAs.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right; white-space:nowrap;\">\n        <div style=\"font-size:72px; font-weight:700; color:var(--green-deep); line-height:1;\">6,946<\u002Fdiv>\n        <div style=\"font-family:var(--mono); font-size:18px; text-transform:uppercase; letter-spacing:0.08em; color:var(--gray); margin-top:8px;\">LinkedIn followers<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:46px; flex:1;\">\n      <div style=\"border-top:3px solid var(--green); padding-top:18px;\">\n        <div style=\"font-family:var(--mono); font-size:24px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink); margin-bottom:20px;\">Strengths<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"display:flex; gap:11px;\"><span style=\"color:var(--green);\">–<\u002Fspan><span style=\"font-size:24px; color:var(--gray); line-height:1.34;\">Best audience-fit channel for partners and donors.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:11px;\"><span style=\"color:var(--green);\">–<\u002Fspan><span style=\"font-size:24px; color:var(--gray); line-height:1.34;\">Credible proof (e.g., scholar → Charles Schwab).<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:11px;\"><span style=\"color:var(--green);\">–<\u002Fspan><span style=\"font-size:24px; color:var(--gray); line-height:1.34;\">Consistent brand hashtags (#gpeffect).<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:11px;\"><span style=\"color:var(--green);\">–<\u002Fspan><span style=\"font-size:24px; color:var(--gray); line-height:1.34;\">Steady cadence of wins and announcements.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:3px solid var(--gray-2); padding-top:18px;\">\n        <div style=\"font-family:var(--mono); font-size:24px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink); margin-bottom:20px;\">Gaps<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"display:flex; gap:11px;\"><span style=\"color:var(--gray-2);\">–<\u002Fspan><span style=\"font-size:24px; color:var(--gray); line-height:1.34;\">Heavily announcement-driven.<\u002Fspan><\u002Fdiv>\n          <di -bottom:5px;\">Refocus Instagram on quality.<\u002Fspan><span style=\"display:block; font-size:25px; color:var(--gray); line-height:1.4;\">Fewer, save-worthy scholar-journey reels over daily volume; stop follow-back tactics.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:34px; align-items:baseline; padding:22px 0; border-top:1px solid var(--line);\">\n        <span style=\"font-family:var(--mono); font-size:36px; color:var(--green-deep); font-weight:500; min-width:52px;\">4<\u002Fspan>\n        <div style=\"flex:1;\"><span style=\"display:block; font-size:30px; font-weight:700; margin-bottom:5px;\">Series-ify scholar stories.<\u002Fspan><span style=\"display:block; font-size:25px; color:var(--gray); line-height:1.4;\">Recurring franchises across LinkedIn, Instagram, and YouTube from one shoot.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:34px; align-items:baseline; padding:22px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line);\">\n        <span style=\"font-family:var(--mono); font-size:36px; color:var(--green-deep); font-weight:500; min-width:52px;\">5<\u002Fspan>\n        <div style=\"flex:1;\"><span style=\"display:block; font-size:30px; font-weight:700; margin-bottom:5px;\">Stand up a simple performance dashboard.<\u002Fspan><span style=\"display:block; font-size:25px; color:var(--gray); line-height:1.4;\">Track followers, engagement, and applicant conversion by channel.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 09 · MANDATE -->\n  <section data-label=\"The mandate\" data-screen-label=\"09 Mandate\" data-speaker-notes=\"The mandate: turn scholar stories and recruitment goals into scalable, AI-powered social content. To finalize: internal metrics, Kwesi's top posts, and a confirmed approval owner. Immediate next move: the June 15 recruitment sprint.\" class=\"slide\" style=\"background:#16160F; color:#FFFFFF; justify-content:sp
